autonomous_actions:

  restart_service:
    allowed: true
    requires_approval: false

  send_notification:
    allowed: true
    requires_approval: false

  cleanup_cache:
    allowed: true
    requires_approval: false
    restricted_to_safe_paths: true

  kill_process:
    allowed: false
    requires_approval: true

  delete_files:
    allowed: false
    requires_approval: true

  modify_system_config:
    allowed: false
    requires_approval: true

allowed_commands:
  - "systemctl restart"
  - "systemctl status"
  - "systemctl is-active"

task_risks:
  restart_service: "LOW"
  cleanup_cache: "MEDIUM"
  delete_files: "HIGH"
  modify_system_config: "HIGH"