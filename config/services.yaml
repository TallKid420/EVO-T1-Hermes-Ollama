daemon:
  tick_seconds: 10
  dedup_repeat_seconds: 300
  autostart: false
  pid_file: /tmp/hermes.pid
  api:
    enabled: false
    host: 127.0.0.1
    port: 5000
flask:
  enabled: false
  host: 127.0.0.1
  port: 5000
managed_services:
- name: hermes
  systemd_unit: hermes.service
  auto_restart: false
  max_restarts_per_hour: 3
  cooldown_seconds: 600
