system_agents:
  planner:
    model: "llama3.2:3b"
    provider: "ollama"
    endpoint: "http://localhost:11434"
    timeout_seconds: 15
    allowed_actions:
      - restart_service
      - cleanup_cache
      - send_notification
      - delete_files
      - notify_user
    rules:
      - "If risk is high (for example deleting non-cache files), set requires_approval=true"
      - "Always respond in valid JSON only"

