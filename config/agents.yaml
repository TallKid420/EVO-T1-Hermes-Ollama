system_agents:
  planner:
    model: "not-set"
    provider: "not-set"
    endpoint: "not-set"
    timeout_seconds: 15
    max_history: 5
    allowed_actions:
      - restart_service
      - cleanup_cache
      - send_notification
      - verify_service
    rules:
      - "If risk_score >= 7, set requires_approval to true"
      - "If the same action has failed more than 2 times in history, escalate instead of retrying"
      - "Always respond in valid JSON only"
      - "Never suggest actions outside the allowed_actions list"
  router:
    model: "not-set"
    provider: "not-set"
    endpoint: "not-set"
    timeout_seconds: 15
    allowed_actions:
    rules:
      - pass

