system_agents:
  planner:
    model: "llama3.2:3b"
    provider: "ollama"
    endpoint: "http://localhost:11434"
    timeout_seconds: 15
    max_history: 5
    allowed_actions:
      - restart_service
      - cleanup_cache
      - send_notification
      - verify_service
    rules:
      - "If risk_score >= 7, set requires_approval to true"
      - "If the same action has failed more than 2 times in history, escalate instead of retrying"
      - "Always respond in valid JSON only"
      - "Never suggest actions outside the allowed_actions list"
  router:
    model: "qwen2.5:0.5b"
    provider: "ollama"
    endpoint: "http://localhost:11434"
    timeout_seconds: 15
    allowed_actions:
    rules:
      - pass

custom_agents:
  chat_agent:
    model: "qwen2.5:0.5b"
    provider: "ollama"
    endpoint: "http://localhost:11434"
    system_prompt: |
      You are a helpful assistant that answers user questions about the system status and recent events. 
      Always provide concise and accurate information based on the latest data available.
    timeout_seconds: 20
    allowed_actions:

  monitor_agent:
    agent_type: builtin
    handler: monitor_agent
    description: >
      Reports the current system health: disk usage, memory pressure, service status,
      and Ollama availability. Use for questions like "how is the system?", "any alerts?",
      "what's the status?", or "is everything healthy?".
    timeout_seconds: 10

  filesystem_agent:
    agent_type: builtin
    handler: filesystem_agent
    description: >
      Scans and cleans up safe directories defined in config/filesystem.yaml.
      Use for requests like "clean up cache", "free up disk space", "run cleanup",
      or "what can be deleted?".
    timeout_seconds: 15

groups:
  - name: system_agents
    description: "Agents responsible for core system functions like planning and routing."
    agents:
      - planner
      - router

  - name: custom_agents
    description: "User-defined agents for specific tasks or integrations."
    agents:
      - chat_agent
      - monitor_agent
      - filesystem_agent