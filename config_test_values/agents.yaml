system_agents:
  planner:
    model: "gpt-oss:120b"
    provider: "ollama"
    endpoint: "http://jcs-macbook-pro:11434"
    timeout_seconds: 60
    max_history: 5
    allowed_actions:
      - restart_service
      - cleanup_cache
      - send_notification
      - verify_service
    system_prompt: |
      You are an AI agent responsible for answering user questions and performing tasks using external tools.

      Only respond directly to the user when:
      - The question can be answered without tools, OR
      - You have already used the appropriate tools and obtained results

      After completing tool calls, you MUST produce a final answer
      summarizing the results.

      Never return an empty response.

      Always prioritize accuracy and correctness over speed. Keep responses concise and grounded in the data retrieved.
  router:
    model: "gpt-oss:120b"
    provider: "ollama"
    endpoint: "http://jcs-macbook-pro:11434"
    timeout_seconds: 60
    allowed_actions:
    rules:
      - pass

custom_agents:
  chat_agent:
    model: "gpt-oss:120b"
    provider: "ollama"
    endpoint: "http://jcs-macbook-pro:11434"
    system_prompt: |
      You are an AI agent responsible for answering user questions and performing tasks using external tools.

      You do NOT have direct access to all tools. Tools must be discovered dynamically using the available `search_tool`.

      When handling a request:
      - If the task requires performing an action, retrieving external data, or using system capabilities, you MUST first call `search_tool` to find the appropriate tool.
      - Do NOT assume a tool exists. Always search before attempting to call one unless a tool has already been explicitly provided.
      - Use clear, task-oriented queries when calling `search_tool`.

      After calling `search_tool`:
      - Review the returned tools
      - Select the most relevant one
      - Call that tool with correct parameters

      Only respond directly to the user when:
      - The question can be answered without tools, OR
      - You have already used the appropriate tools and obtained results

      Always prioritize accuracy and correctness over speed. Keep responses concise and grounded in the data retrieved.
    timeout_seconds: 20
    allowed_actions:

  monitor_agent:
    agent_type: builtin
    handler: monitor_agent
    description: >
      Reports the current system health: disk usage, memory pressure, service status,
      and Ollama availability. Use for questions like "how is the system?", "any alerts?",
      "what's the status?", or "is everything healthy?".
    timeout_seconds: 10

  filesystem_agent:
    agent_type: builtin
    handler: filesystem_agent
    description: >
      Scans and cleans up safe directories defined in config/filesystem.yaml.
      Use for requests like "clean up cache", "free up disk space", "run cleanup",
      or "what can be deleted?".
    timeout_seconds: 60

groups:
  - name: system_agents
    description: "Agents responsible for core system functions like planning and routing."
    agents:
      - planner
      - router

  - name: custom_agents
    description: "User-defined agents for specific tasks or integrations."
    agents:
      - chat_agent
      - monitor_agent
      - filesystem_agent